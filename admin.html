<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gio Acessórios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --marrom:#887363;--creme:#f0e5d8;--escuro:#392012;--cafe:#4e3220;
    --dourado:#c8ae8b;--ouro:#b8975a;--bg:#f7f2eb;--borda:rgba(57,32,18,0.13);
    --branco:#fdfaf6;--verde:#2a6b3f;--verde-bg:#eaf3ee;
    --vermelho:#8b2e2e;--vermelho-bg:#f9eaea;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cafe);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:var(--branco);border:1px solid var(--borda);border-radius:4px;padding:2.5rem;width:360px;text-align:center}
  .login-logo{height:60px;margin:0 auto 0.75rem;display:block}
  .login-sub{font-size:12px;color:var(--marrom);margin-bottom:2rem;letter-spacing:0.1em;text-transform:uppercase}
  .login-input{
    width:100%;padding:11px 14px;border:1px solid var(--borda);border-radius:2px;
    background:var(--creme);font-family:'DM Sans',sans-serif;font-size:14px;
    color:var(--cafe);margin-bottom:12px;outline:none;transition:border-color 0.2s;
  }
  .login-input:focus{border-color:var(--ouro)}
  .login-btn{
    width:100%;padding:12px;background:var(--escuro);color:var(--creme);
    border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:11px;
    letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;
  }
  .login-btn:hover{background:var(--cafe)}
  .login-erro{font-size:12px;color:var(--vermelho);margin-top:8px}

  .admin{display:none}
  .admin.logado{display:block}

  .admin-header{
    position:sticky;top:0;z-index:50;
    background:var(--escuro);padding:0 2rem;height:60px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .admin-logo{height:36px}
  .header-actions{display:flex;gap:10px;align-items:center}
  .btn-header{
    padding:7px 16px;border-radius:2px;font-size:11px;
    font-family:'DM Sans',sans-serif;letter-spacing:0.1em;text-transform:uppercase;
    cursor:pointer;border:1px solid rgba(200,174,139,0.4);
    color:var(--dourado);background:none;transition:all 0.2s;text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn-header:hover{background:rgba(200,174,139,0.15)}
  .btn-header.destaque{background:var(--ouro);border-color:var(--ouro);color:var(--escuro)}
  .btn-header.destaque:hover{background:var(--dourado)}

  .admin-content{max-width:1080px;margin:0 auto;padding:2rem}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--cafe)}

  .btn-novo{
    padding:9px 22px;background:var(--escuro);color:var(--creme);
    border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:11px;
    letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;
  }
  .btn-novo:hover{background:var(--cafe)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem}
  .stat-card{background:var(--branco);border:1px solid var(--borda);border-radius:4px;padding:1.25rem}
  .stat-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--marrom);margin-bottom:6px}
  .stat-val{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;color:var(--cafe)}
  .stat-sub{font-size:11px;color:var(--marrom);margin-top:2px}

  .config-strip{
    background:var(--branco);border:1px solid var(--borda);border-radius:4px;
    padding:1.25rem 1.5rem;margin-bottom:2rem;
    display:flex;align-items:flex-end;gap:1.5rem;flex-wrap:wrap;
  }
  .config-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--marrom);margin-bottom:5px}
  .config-input{
    padding:9px 12px;border:1px solid var(--borda);border-radius:2px;
    background:var(--creme);font-family:'DM Sans',sans-serif;
    font-size:13px;color:var(--cafe);outline:none;width:220px;transition:border-color 0.2s;
  }
  .config-input:focus{border-color:var(--ouro)}
  .config-save{
    padding:10px 20px;background:var(--ouro);color:var(--escuro);
    border:none;border-radius:2px;font-size:11px;cursor:pointer;
    font-family:'DM Sans',sans-serif;letter-spacing:0.1em;text-transform:uppercase;
    transition:background 0.2s;
  }
  .config-save:hover{background:var(--escuro);color:var(--creme)}

  .tabela-wrap{background:var(--branco);border:1px solid var(--borda);border-radius:4px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{
    background:var(--creme);font-size:10px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--marrom);font-weight:400;
    padding:12px 16px;text-align:left;border-bottom:1px solid var(--borda);
  }
  td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--borda);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--bg)}
  .td-nome{font-weight:400;color:var(--cafe)}
  .td-sub{font-size:11px;color:var(--marrom);margin-top:2px}
  .td-preco{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ouro)}
  .est-badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:400;letter-spacing:0.06em}
  .est-ok{background:var(--verde-bg);color:var(--verde)}
  .est-baixo{background:#fef3e2;color:#8a5000}
  .est-zero{background:var(--vermelho-bg);color:var(--vermelho)}
  .td-acoes{display:flex;gap:8px}
  .btn-acao{
    padding:5px 12px;border-radius:2px;font-size:11px;cursor:pointer;
    font-family:'DM Sans',sans-serif;border:1px solid var(--borda);
    background:none;color:var(--cafe);transition:all 0.15s;letter-spacing:0.04em;
  }
  .btn-acao:hover{background:var(--creme)}
  .btn-acao.del{color:var(--vermelho);border-color:var(--vermelho-bg)}
  .btn-acao.del:hover{background:var(--vermelho-bg)}

  .modal-bg{
    display:none;position:fixed;inset:0;
    background:rgba(57,32,18,0.55);z-index:200;
    align-items:center;justify-content:center;
  }
  .modal-bg.aberto{display:flex}
  .modal-card{
    background:var(--branco);border-radius:4px;
    padding:2rem;width:560px;max-width:95vw;
    max-height:90vh;overflow-y:auto;
    animation:popIn 0.22s ease;
  }
  @keyframes popIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
  .modal-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:1.5rem;color:var(--cafe)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  .form-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--marrom)}
  .form-input{
    padding:9px 12px;border:1px solid var(--borda);border-radius:2px;
    background:var(--creme);font-family:'DM Sans',sans-serif;
    font-size:14px;color:var(--cafe);outline:none;transition:border-color 0.2s;
  }
  .form-input:focus{border-color:var(--ouro)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
  .btn-cancelar{
    padding:10px 22px;border:1px solid var(--borda);border-radius:2px;
    background:none;cursor:pointer;font-size:11px;color:var(--cafe);
    font-family:'DM Sans',sans-serif;letter-spacing:0.08em;text-transform:uppercase;
  }
  .btn-salvar{
    padding:10px 22px;background:var(--escuro);color:var(--creme);
    border:none;border-radius:2px;cursor:pointer;font-size:11px;
    font-family:'DM Sans',sans-serif;letter-spacing:0.1em;text-transform:uppercase;
    transition:background 0.2s;
  }
  .btn-salvar:hover{background:var(--cafe)}

  .toast-area{position:fixed;bottom:1.5rem;right:1.5rem;z-index:400}
  .toast-item{
    background:var(--escuro);color:var(--creme);
    padding:10px 20px;border-radius:2px;font-size:12px;
    margin-top:8px;letter-spacing:0.06em;
    border-left:3px solid var(--ouro);
    animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:600px){
    .admin-content{padding:1rem}
    .form-grid{grid-template-columns:1fr}
    th,td{padding:10px 12px}
    .config-strip{flex-direction:column}
    .config-input{width:100%}
  }
</style>
</head>

  return [
    {id:1,nome:"Anel Solitário Gold",sub:"Banho de ouro 18k",preco:89,emoji:"💍",cat:"Anéis",variacoes:["14","16","18","20"],estoque:10,foto:""},
    {id:2,nome:"Brinco Argola Slim",sub:"Dourado / Prata",preco:59,emoji:"✨",cat:"Brincos",variacoes:["Dourado","Prata"],estoque:15,foto:""},
    {id:3,nome:"Colar Corrente Fina",sub:"Banho de ouro 18k",preco:119,emoji:"📿",cat:"Colares",variacoes:["40cm","45cm","50cm"],estoque:8,foto:""},
    {id:4,nome:"Pulseira Delicada",sub:"Zircônia cristal",preco:79,emoji:"💛",cat:"Pulseiras",variacoes:["P/M","G"],estoque:0,foto:""},
    {id:5,nome:"Tornozeleira Gold",sub:"Regulável",preco:65,emoji:"⭐",cat:"Tornozeleiras",variacoes:[],estoque:12,foto:""},
    {id:6,nome:"Conjunto Minimalista",sub:"Brinco + Colar",preco:159,emoji:"🌟",cat:"Conjuntos",variacoes:["Dourado","Rosé"],estoque:5,foto:""},
  ];
}
function salvarProdutos(p) { localStorage.setItem('gio_produtos', JSON.stringify(p)); }

function renderStats() {
  const ps = getProdutos();
  const disp = ps.filter(p=>p.estoque>0).length;
  const baix = ps.filter(p=>p.estoque>0&&p.estoque<=3).length;
  const esg  = ps.filter(p=>p.estoque===0).length;
  document.getElementById('statsArea').innerHTML =
    stat('Total de produtos', ps.length) +
    stat('Disponíveis', disp, 'color:var(--verde)') +
    stat('Estoque baixo', baix, 'color:#8a5000', '≤ 3 unidades') +
    stat('Esgotados', esg, 'color:var(--vermelho)');
}
function stat(label, val, style='', sub='') {
  return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-val" style="'+style+'">'+val+'</div>'+(sub?'<div class="stat-sub">'+sub+'</div>':'')+'</div>';
}

function renderTabela() {
  const ps = getProdutos();
  const tbody = document.getElementById('tabelaBody');
  if (!ps.length) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--marrom);padding:2rem">Nenhum produto cadastrado</td></tr>'; return; }
  tbody.innerHTML = ps.map(p => {
    const cls = p.estoque===0?'est-zero':p.estoque<=3?'est-baixo':'est-ok';
    const txt = p.estoque===0?'Esgotado':p.estoque+' un.';
    return '<tr><td><div style="display:flex;align-items:center;gap:12px">' +
      '<span style="font-size:22px">'+p.emoji+'</span>' +
      '<div><div class="td-nome">'+p.nome+'</div><div class="td-sub">'+p.sub+'</div></div>' +
    '</div></td>' +
    '<td>'+p.cat+'</td>' +
    '<td class="td-preco">R$ '+p.preco.toFixed(2).replace('.',',')+'</td>' +
    '<td><span class="est-badge '+cls+'">'+txt+'</span></td>' +
    '<td><div class="td-acoes">' +
      '<button class="btn-acao" onclick="editarProduto('+p.id+')">Editar</button>' +
      '<button class="btn-acao del" onclick="deletarProduto('+p.id+')">Remover</button>' +
    '</div></td></tr>';
  }).join('');
}

function abrirModalNovo() {
  document.getElementById('modalTitulo').textContent='Novo produto';
  document.getElementById('editId').value='';
  ['fNome','fSub','fPreco','fEstoque','fCat','fEmoji','fVars','fFoto'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modalBg').classList.add('aberto');
}
function editarProduto(id) {
  const p = getProdutos().find(x=>x.id===id);
  document.getElementById('modalTitulo').textContent='Editar produto';
  document.getElementById('editId').value=id;
  document.getElementById('fNome').value=p.nome;
  document.getElementById('fSub').value=p.sub;
  document.getElementById('fPreco').value=p.preco;
  document.getElementById('fEstoque').value=p.estoque;
  document.getElementById('fCat').value=p.cat;
  document.getElementById('fEmoji').value=p.emoji;
  document.getElementById('fVars').value=(p.variacoes||[]).join(', ');
  document.getElementById('fFoto').value=p.foto||'';
  document.getElementById('modalBg').classList.add('aberto');
}
function fecharModal() { document.getElementById('modalBg').classList.remove('aberto'); }
function salvarProduto() {
  const nome=document.getElementById('fNome').value.trim();
  const preco=parseFloat(document.getElementById('fPreco').value);
  const estoque=parseInt(document.getElementById('fEstoque').value);
  if (!nome||isNaN(preco)||isNaN(estoque)) { toast('Preencha nome, preço e estoque'); return; }
  const ps=getProdutos(), editId=parseInt(document.getElementById('editId').value);
  const vars=document.getElementById('fVars').value.trim();
  const novoProduto={
    id:editId||Date.now(), nome, preco, estoque,
    sub:document.getElementById('fSub').value.trim(),
    cat:document.getElementById('fCat').value.trim()||'Geral',
    emoji:document.getElementById('fEmoji').value.trim()||'💎',
    variacoes:vars?vars.split(',').map(v=>v.trim()).filter(Boolean):[],
    foto:document.getElementById('fFoto').value.trim(),
  };
  if (editId) { ps[ps.findIndex(x=>x.id===editId)]=novoProduto; toast('Produto atualizado ✓'); }
  else { ps.push(novoProduto); toast('Produto adicionado ✓'); }
  salvarProdutos(ps); fecharModal(); renderTabela(); renderStats();
}
function deletarProduto(id) {
  if (!confirm('Remover este produto?')) return;
  salvarProdutos(getProdutos().filter(p=>p.id!==id));
  renderTabela(); renderStats(); toast('Produto removido');
}

function carregarConfig() {
  document.getElementById('cfgHandle').value=localStorage.getItem('cfg_handle')||'';
  document.getElementById('cfgLogo').value=localStorage.getItem('gio_logo_url')||'';
  document.getElementById('cfgWebhook').value=localStorage.getItem('cfg_webhook')||'';
}
function salvarConfig() {
  const h=document.getElementById('cfgHandle').value.trim();
  const w=document.getElementById('cfgWebhook').value.trim();
  const s=document.getElementById('cfgSenha').value;
  if (h) localStorage.setItem('cfg_handle',h);
  const l=document.getElementById('cfgLogo').value.trim();
  localStorage.setItem('gio_logo_url', l);
  if (w) localStorage.setItem('cfg_webhook',w);
  if (s) { localStorage.setItem('gio_admin_senha',s); document.getElementById('cfgSenha').value=''; }
  toast('Configurações salvas ✓');
}

function toast(msg) {
  const area=document.getElementById('toastArea');
  const el=document.createElement('div');
  el.className='toast-item'; el.textContent=msg;
  area.appendChild(el); setTimeout(()=>el.remove(), 2500);
}

function iniciarAdmin() { carregarConfig(); renderStats(); renderTabela(); }
if (sessionStorage.getItem('gio_admin_ok')==='1') {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminWrap').classList.add('logado');
  iniciarAdmin();
}
</script>
</body>
