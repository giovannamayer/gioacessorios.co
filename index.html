<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gio Acessórios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--marrom:#887363;--creme:#f0e5d8;--escuro:#392012;--cafe:#4e3220;--creme2:#f0e2c7;--dourado:#c8ae8b;--ouro:#b8975a;--ouro-bri:#d4aa6a;--bg:#f7f2eb;--borda:rgba(57,32,18,0.13);--branco:#fdfaf6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cafe);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:var(--escuro);padding:0 1.5rem;height:68px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--creme2)}
.logo span{color:var(--ouro)}
.insta{font-size:11px;letter-spacing:0.08em;color:var(--dourado);text-decoration:none;opacity:0.75}
.insta:hover{opacity:1}
.cart-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:2px;border:1px solid var(--ouro);background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;color:var(--ouro);transition:all 0.2s}
.cart-btn:hover{background:var(--ouro);color:var(--escuro)}
.cart-badge{background:var(--ouro);color:var(--escuro);border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center}
.cart-btn:hover .cart-badge{background:var(--escuro);color:var(--ouro)}
.hero{background:var(--escuro);padding:4rem 1.5rem 3rem;text-align:center}
.hero-tag{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ouro);margin-bottom:1.2rem}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:300;color:var(--creme);line-height:1.1;margin-bottom:0.5rem}
.hero h1 em{font-style:italic;color:var(--ouro-bri)}
.hero p{font-size:12px;color:var(--dourado);letter-spacing:0.1em}
.filtros{display:flex;gap:0.5rem;flex-wrap:wrap;padding:1.25rem 1.5rem;border-bottom:1px solid var(--borda);background:var(--branco)}
.filtro{padding:5px 18px;border-radius:2px;border:1px solid var(--borda);background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--marrom);transition:all 0.2s}
.filtro:hover,.filtro.ativo{background:var(--cafe);color:var(--creme2);border-color:var(--cafe)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--borda)}
.card{background:var(--branco);cursor:pointer;overflow:hidden;transition:background 0.2s}
.card:hover{background:var(--creme)}
.card-img{aspect-ratio:3/4;overflow:hidden;background:var(--creme2);display:flex;align-items:center;justify-content:center;position:relative;font-size:72px}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.card:hover .card-img img{transform:scale(1.04)}
.esg-overlay{position:absolute;inset:0;background:rgba(247,242,235,0.75);display:flex;align-items:center;justify-content:center}
.esg-tag{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--marrom);border:1px solid var(--borda);background:var(--branco);padding:5px 14px;border-radius:2px}
.card-info{padding:1rem 1.25rem}
.card-nome{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;margin-bottom:3px;color:var(--cafe);line-height:1.2}
.card-sub{font-size:12px;color:var(--marrom);margin-bottom:8px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-preco{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--cafe)}
.add-btn{width:30px;height:30px;border-radius:2px;border:1px solid var(--borda);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--cafe);transition:all 0.2s}
.add-btn:hover{background:var(--cafe);color:var(--creme2)}
.ultimas{font-size:10px;color:var(--ouro);letter-spacing:0.08em;text-transform:uppercase}
footer{background:var(--escuro);padding:2.5rem 1.5rem;text-align:center}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--creme2);margin-bottom:0.75rem}
.footer-logo span{color:var(--ouro)}
.footer-insta{font-size:11px;letter-spacing:0.1em;color:var(--dourado);text-decoration:none}
.footer-copy{font-size:10px;color:var(--marrom);margin-top:1rem;letter-spacing:0.06em}
/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(57,32,18,0.45);z-index:200}
.overlay.on{display:block}
.drawer{position:fixed;top:0;right:-420px;bottom:0;width:min(420px,100vw);background:var(--branco);z-index:201;display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);border-left:1px solid var(--borda)}
.drawer.on{right:0}
.drawer-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;background:var(--escuro)}
.drawer-titulo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;letter-spacing:0.08em;color:var(--creme)}
.fechar{background:none;border:none;cursor:pointer;font-size:20px;color:var(--dourado)}
.drawer-itens{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.vazio{text-align:center;padding:3rem 0;color:var(--marrom);font-size:14px}
.item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--borda)}
.item-thumb{width:60px;height:74px;border-radius:2px;background:var(--creme2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-nome{font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:3px}
.item-var{font-size:11px;color:var(--marrom);margin-bottom:8px}
.item-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:24px;height:24px;border-radius:2px;border:1px solid var(--borda);background:none;cursor:pointer;font-size:14px;color:var(--cafe);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.qty-btn:hover{background:var(--cafe);color:var(--creme2)}
.item-preco{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:var(--ouro);white-space:nowrap}
.drawer-footer{padding:1.25rem 1.5rem;border-top:1px solid var(--borda)}
.total-row{display:flex;justify-content:space-between;margin-bottom:1rem}
.total-label{font-size:11px;color:var(--marrom);letter-spacing:0.12em;text-transform:uppercase}
.total-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--cafe)}
.pagar-btn{width:100%;padding:13px;background:var(--escuro);color:var(--creme2);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.pagar-btn:hover{background:var(--cafe)}
.pagar-btn:disabled{opacity:0.4;cursor:not-allowed}
.loading{font-size:11px;color:var(--marrom);text-align:center;margin-top:8px;letter-spacing:0.06em}
/* MODAL VARIAÇÃO */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(57,32,18,0.55);z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--branco);border-radius:4px 4px 0 0;padding:1.75rem;width:100%;max-width:480px;position:relative}
.modal-nome{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:3px;color:var(--cafe)}
.modal-preco{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ouro);margin-bottom:1.25rem}
.var-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--marrom);margin-bottom:8px}
.var-opts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem}
.var-btn{padding:7px 16px;border:1px solid var(--borda);background:none;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.05em;color:var(--cafe);transition:all 0.15s}
.var-btn:hover,.var-btn.sel{background:var(--cafe);color:var(--creme2);border-color:var(--cafe)}
.var-btn:disabled,.var-btn.esg{opacity:0.35;cursor:not-allowed;text-decoration:line-through}
.modal-add{width:100%;padding:12px;background:var(--escuro);color:var(--creme2);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.modal-add:hover{background:var(--cafe)}
.modal-fechar{position:absolute;top:1rem;right:1.25rem;background:none;border:none;font-size:20px;color:var(--marrom);cursor:pointer}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--escuro);color:var(--creme2);padding:9px 24px;border-radius:2px;border:1px solid var(--ouro);font-size:12px;letter-spacing:0.08em;z-index:400;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
/* LOADING */
.carregando{text-align:center;padding:4rem 1rem;color:var(--marrom);font-size:13px;letter-spacing:0.08em}
@media(max-width:600px){header{padding:0 1rem}.hero{padding:3rem 1rem 2.5rem}.filtros{padding:1rem}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="logo">GIO <span>ACESSÓRIOS</span></div>
  <a class="insta" href="https://instagram.com/gioacessorios.co" target="_blank">@gioacessorios.co</a>
  <button class="cart-btn" onclick="abrirCarrinho()">
    Sacola <span class="cart-badge" id="badge">0</span>
  </button>
</header>

<section class="hero">
  <p class="hero-tag">Semi Joias &amp; Acessórios</p>
  <h1>GIO<br><em>Acessórios</em></h1>
  <p>Elegante · Exclusivo · Moderno</p>
</section>

<div class="filtros" id="filtros"></div>
<div class="grid" id="grid"><div class="carregando">Carregando...</div></div>

<footer>
  <div class="footer-logo">GIO <span>ACESSÓRIOS</span></div>
  <a class="footer-insta" href="https://instagram.com/gioacessorios.co" target="_blank">@gioacessorios.co</a>
  <p class="footer-copy">© Gio Acessórios — Todos os direitos reservados</p>
</footer>

<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-titulo">Minha Sacola</span>
    <button class="fechar" onclick="fecharCarrinho()">✕</button>
  </div>
  <div class="drawer-itens" id="drawerItens"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="total-row"><span class="total-label">Total</span><span class="total-val" id="totalVal">R$ 0,00</span></div>
    <button class="pagar-btn" id="pagarBtn" onclick="finalizar()">Finalizar compra</button>
    <p class="loading" id="loadingTxt" style="display:none">Gerando link...</p>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-fechar" onclick="fecharModal()">✕</button>
    <div class="modal-nome" id="mNome"></div>
    <div class="modal-preco" id="mPreco"></div>
    <div id="mVars"></div>
    <button class="modal-add" onclick="addDoModal()">Adicionar à sacola</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const HANDLE = 'gioacessorios';

async function dbQuery(query, params) {
  const r = await fetch('/api/db', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, params: params || [] })
  });
  if (!r.ok) throw new Error('DB error ' + r.status);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.rows || [];
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
let produtos = [];
let carrinho = {};
let catAtual = 'todos';
let mProduto = null;
let mVarSel = null;

// ── BANCO DE DADOS ──────────────────────────────────────────────────────────────────
async function carregarProdutos() {
  try {
    const data = await dbQuery('SELECT nome,sub,preco,estoque,cat,emoji,variacoes,estoque_vars,foto,visivel FROM gioloja WHERE visivel=true ORDER BY nome');
    if (!Array.isArray(data)) throw new Error('Resposta inválida');
    produtos = data.map(p => ({
      id: p.id,
      nome: p.nome || '',
      sub: p.sub || '',
      preco: parseFloat(p.preco) || 0,
      estoque: parseInt(p.estoque) || 0,
      cat: p.cat || 'Geral',
      emoji: p.emoji || '💎',
      variacoes: p.variacoes ? p.variacoes.split(',').map(v => v.trim()).filter(Boolean) : [],
      estoqueVars: p.estoque_vars
        ? Object.fromEntries(p.estoque_vars.split(',').filter(Boolean).map(x => {
            const [k, v] = x.split(':'); return [k.trim(), parseInt(v) || 0];
          }))
        : {},
      foto: p.foto || '',
      visivel: true
    }));
  } catch(e) {
    console.error('Erro ao carregar:', e);
    produtos = [];
  }
  renderFiltros();
  renderGrid();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderFiltros() {
  const cats = ['todos', ...new Set(produtos.map(p => p.cat))];
  document.getElementById('filtros').innerHTML = cats.map(c =>
    `<button class="filtro ${c===catAtual?'ativo':''}" onclick="filtrar(this,'${c}')">${c==='todos'?'Todos':c}</button>`
  ).join('');
}

function esgotado(p) {
  if (p.variacoes.length > 0 && Object.keys(p.estoqueVars).length > 0)
    return Object.values(p.estoqueVars).every(q => q === 0);
  return p.estoque === 0;
}

function renderGrid() {
  const lista = (catAtual === 'todos' ? produtos : produtos.filter(p => p.cat === catAtual));
  if (!lista.length) {
    document.getElementById('grid').innerHTML = '<div class="carregando">Nenhum produto encontrado</div>';
    return;
  }
  document.getElementById('grid').innerHTML = lista.map((p, i) => {
    const esg = esgotado(p);
    return `<div class="card" ${esg ? '' : `onclick="abrirModal(${p.id})"`} style="animation-delay:${i*0.04}s">
      <div class="card-img">
        ${p.foto ? `<img src="${p.foto}" alt="${p.nome}" loading="lazy">` : p.emoji}
        ${esg ? '<div class="esg-overlay"><span class="esg-tag">Esgotado</span></div>' : ''}
      </div>
      <div class="card-info">
        <div class="card-nome">${p.nome}</div>
        <div class="card-sub">${p.sub}</div>
        <div class="card-footer">
          <span class="card-preco">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
          ${p.estoque > 0 && p.estoque <= 3 && !esg ? `<span class="ultimas">Últimas ${p.estoque}</span>` : ''}
          ${esg ? '' : `<button class="add-btn" onclick="event.stopPropagation();abrirModal(${p.id})">+</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filtrar(el, cat) {
  catAtual = cat;
  document.querySelectorAll('.filtro').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  renderGrid();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function abrirModal(id) {
  mProduto = produtos.find(p => p.id === id);
  mVarSel = null;
  document.getElementById('mNome').textContent = mProduto.nome;
  document.getElementById('mPreco').textContent = `R$ ${mProduto.preco.toFixed(2).replace('.',',')}`;
  const div = document.getElementById('mVars');
  if (mProduto.variacoes.length > 0) {
    const ev = mProduto.estoqueVars;
    const temEV = Object.keys(ev).length > 0;
    div.innerHTML = `<p class="var-label">Variação</p><div class="var-opts">` +
      mProduto.variacoes.map(v => {
        const qtd = temEV ? (ev[v] || 0) : 99;
        const esg = qtd === 0;
        return `<button class="var-btn${esg?' esg':''}" ${esg?'disabled':''} onclick="selVar(this,'${v}')">${v}</button>`;
      }).join('') + '</div>';
  } else {
    div.innerHTML = '';
    mVarSel = 'Único';
  }
  document.getElementById('modalBg').classList.add('on');
}
function fecharModal() { document.getElementById('modalBg').classList.remove('on'); }
function selVar(el, v) {
  document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  mVarSel = v;
}
function addDoModal() {
  if (mProduto.variacoes.length > 0 && !mVarSel) { toast('Selecione uma variação'); return; }
  const key = `${mProduto.id}_${mVarSel||''}`;
  const estoqueDisp = getEstoque(mProduto, mVarSel);
  const qtdCart = carrinho[key] ? carrinho[key].qty : 0;
  if (qtdCart >= estoqueDisp) { toast('Estoque máximo atingido'); return; }
  if (!carrinho[key]) carrinho[key] = { produto: mProduto, variacao: mVarSel, qty: 0 };
  carrinho[key].qty++;
  fecharModal();
  atualizarBadge();
  toast(`${mProduto.nome} adicionado ✓`);
}
function getEstoque(p, v) {
  if (v && v !== 'Único' && Object.keys(p.estoqueVars).length > 0) return p.estoqueVars[v] || 0;
  return p.estoque;
}

// ── CARRINHO ──────────────────────────────────────────────────────────────────
function abrirCarrinho() { renderCarrinho(); document.getElementById('overlay').classList.add('on'); document.getElementById('drawer').classList.add('on'); }
function fecharCarrinho() { document.getElementById('overlay').classList.remove('on'); document.getElementById('drawer').classList.remove('on'); }

function renderCarrinho() {
  const itens = Object.entries(carrinho).filter(([,v]) => v.qty > 0);
  const div = document.getElementById('drawerItens');
  const footer = document.getElementById('drawerFooter');
  if (!itens.length) {
    div.innerHTML = '<div class="vazio">✨<br><br>Sua sacola está vazia</div>';
    footer.style.display = 'none';
    return;
  }
  let total = 0;
  div.innerHTML = itens.map(([key, item]) => {
    total += item.produto.preco * item.qty;
    return `<div class="item">
      <div class="item-thumb">${item.produto.foto ? `<img src="${item.produto.foto}">` : item.produto.emoji}</div>
      <div style="flex:1">
        <div class="item-nome">${item.produto.nome}</div>
        <div class="item-var">${item.variacao && item.variacao !== 'Único' ? item.variacao : ''}</div>
        <div class="item-ctrl">
          <button class="qty-btn" onclick="mudarQty('${key}',-1)">−</button>
          <span style="font-size:13px;min-width:18px;text-align:center">${item.qty}</span>
          <button class="qty-btn" onclick="mudarQty('${key}',1)">+</button>
        </div>
      </div>
      <div class="item-preco">R$ ${(item.produto.preco * item.qty).toFixed(2).replace('.',',')}</div>
    </div>`;
  }).join('');
  document.getElementById('totalVal').textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
  footer.style.display = 'block';
}

function mudarQty(key, d) {
  if (d > 0) {
    const item = carrinho[key];
    if (item.qty >= getEstoque(item.produto, item.variacao)) { toast('Estoque máximo'); return; }
  }
  carrinho[key].qty += d;
  if (carrinho[key].qty <= 0) delete carrinho[key];
  atualizarBadge();
  renderCarrinho();
}

function atualizarBadge() {
  document.getElementById('badge').textContent = Object.values(carrinho).reduce((a, v) => a + v.qty, 0);
}

// ── CHECKOUT ──────────────────────────────────────────────────────────────────
async function finalizar() {
  const itens = Object.values(carrinho).filter(v => v.qty > 0);
  if (!itens.length) return;
  const btn = document.getElementById('pagarBtn');
  const loading = document.getElementById('loadingTxt');
  btn.disabled = true;
  loading.style.display = 'block';

  const payload = {
    handle: HANDLE,
    redirect_url: window.location.origin + '/sucesso.html',
    order_nsu: 'gio_' + Date.now(),
    items: itens.map(item => ({
      description: item.produto.nome + (item.variacao && item.variacao !== 'Único' ? ' - ' + item.variacao : ''),
      price: Math.round(item.produto.preco * 100),
      quantity: item.qty
    }))
  };

  try {
    const r = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    const link = data.url || data.checkout_url;
    if (link) { window.location.href = link; }
    else throw new Error(data.message || JSON.stringify(data));
  } catch(e) {
    alert('Erro no pagamento. Tente novamente.\n' + e.message);
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}
