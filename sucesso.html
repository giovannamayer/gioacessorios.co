<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido confirmado — Gio Acessórios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--escuro:#392012;--creme:#f0e5d8;--creme2:#f0e2c7;--ouro:#b8975a;--marrom:#887363}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--escuro);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{text-align:center;max-width:400px;padding:2rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--creme2);margin-bottom:2.5rem;display:block}
.logo span{color:var(--ouro)}
.icon{font-size:50px;margin-bottom:1.5rem;display:block}
h1{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--creme);margin-bottom:0.75rem;line-height:1.2}
h1 em{font-style:italic;color:var(--ouro)}
p{font-size:13px;color:var(--marrom);line-height:1.8;margin-bottom:2.5rem;letter-spacing:0.04em}
a{display:inline-block;padding:12px 32px;border:1px solid var(--ouro);color:var(--ouro);border-radius:2px;text-decoration:none;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;transition:all 0.25s}
a:hover{background:var(--ouro);color:var(--escuro)}
</style>
</head>
<body>
<div class="box">
  <span class="logo">GIO <span>ACESSÓRIOS</span></span>
  <span class="icon">✦</span>
  <h1>Pedido <em>confirmado!</em></h1>
  <p>Seu pagamento foi aprovado com sucesso.<br>Obrigada por escolher a Gio Acessórios.</p>
  <a href="index.html">Continuar comprando</a>
</div>
</body>
</html>
