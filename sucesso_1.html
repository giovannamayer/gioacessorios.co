<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido confirmado — Gio Acessórios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--escuro:#392012;--creme:#f0e5d8;--creme2:#f0e2c7;--ouro:#b8975a;--marrom:#887363;--bg:#f7f2eb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--escuro);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .box{text-align:center;max-width:420px;padding:2rem}
  .logo-wrap{margin:0 auto 2.5rem;min-height:44px;display:flex;align-items:center;justify-content:center}
  .logo-img{height:48px;width:auto;object-fit:contain}
  .logo-txt{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--creme2)}
  .logo-txt span{color:var(--ouro)}
  .diamond{font-size:48px;margin-bottom:1.5rem;display:block;animation:pop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
  @keyframes pop{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}
  h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--creme);margin-bottom:0.75rem;line-height:1.2}
  h1 em{font-style:italic;color:var(--ouro)}
  p{font-size:13px;color:var(--marrom);line-height:1.8;margin-bottom:2.5rem;letter-spacing:0.04em}
  a{display:inline-block;padding:13px 36px;border:1px solid var(--ouro);color:var(--ouro);border-radius:2px;text-decoration:none;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;transition:all 0.25s}
  a:hover{background:var(--ouro);color:var(--escuro)}
</style>
</head>
<body>
<div class="box">
  <div class="logo-wrap" id="logoWrap"></div>
  <span class="diamond">✦</span>
  <h1>Pedido <em>confirmado</em></h1>
  <p>Seu pagamento foi aprovado com sucesso.<br>Em breve você receberá mais detalhes.<br>Obrigada por escolher a Gio Acessórios.</p>
  <a href="index.html">Continuar comprando</a>
</div>
<script>
(function(){
  const url = localStorage.getItem('gio_logo_url')||'';
  const wrap = document.getElementById('logoWrap');
  if(url){
    wrap.innerHTML='<img class="logo-img" src="'+url+'" alt="Gio Acessórios" onerror="this.parentNode.innerHTML=\'<div class=logo-txt>GIO <span>ACESSÓRIOS</span></div>\'">';
  } else {
    wrap.innerHTML='<div class="logo-txt">GIO <span>ACESSÓRIOS</span></div>';
  }
})();
</script>
</body>
</html>
